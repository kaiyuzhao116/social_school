server:
  port: 8080
  servlet:
    context-path: /api

spring:

  data:
    redis:
      host: localhost
      port: 6379
  application:
    name: campusconnect-api
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campusconnect?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.campusconnect.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: campusconnect-secret-key-2024-graduation-thesis-project
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 文件上传路径 (使用绝对路径确保一致性)
upload:
  path: G:/Graduation-thesis/campus/campusconnect-api/uploads
  url-prefix: /uploads

# 日志配置
logging:
  level:
    com.campusconnect: debug
    org.springframework.security: debug
